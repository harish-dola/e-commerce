trigger:
  paths:
    include:
      - backend/*

pool: self-hosted

variables:
- group: backend
- name: imageName
  value: backend
- name: imageTag
  value: $(Build.BuildId)
- name: awsAccountId
  value: '235110230377'
- name: awsRegion
  value: 'us-east-1'
- name: repositoryName
  value: 'ecommerce/backend'
- name: clusterName
  value: 'ecommerce-dev-cluster'
- name: serviceName
  value: 'my-backend-service'

stages:
# =========================
# BUILD & PUSH
# =========================
- stage: BuildAndPush
  jobs:
  - job: Docker_Process
    steps:
    - script: docker system prune -f
      displayName: "Clean Docker (Dangling Only)"

    - script: |
        cd backend
        docker build -t $(imageName):$(imageTag) .
      displayName: "Build Docker Image"

    - task: ECRPushImage@1
      displayName: "Push to ECR"
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        imageSource: 'imageName'
        sourceImageName: '$(imageName)'
        sourceImageTag: '$(imageTag)'
        sourceImageId: '$(imageName):$(imageTag)'
        repositoryName: '$(repositoryName)'
        pushTag: latest

# =========================
# DEPLOY
# =========================
- stage: DeployToECS
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    steps:
    # 1. Generate the Task Definition first
    - powershell: |
        $sourcePath = "backend/taskdef.json"
        if (Test-Path $sourcePath) {
            $image = "$(awsAccountId).dkr.ecr.$(awsRegion).amazonaws.com/$(repositoryName):$(imageTag)"
            
            $content = Get-Content $sourcePath
            $content = $content -replace "REPLACE_IMAGE", $image
            $content = $content -replace "REPLACE_DB", "$(DATABASE_URL)"
            $content = $content -replace "REPLACE_SECRET", "$(SECRET_KEY)"
            
            $content | Set-Content -Path "taskdef.json" -Encoding UTF8
            Write-Host "##[section]Created taskdef.json successfully."
        } else {
            Write-Error "Could not find source: $sourcePath"
            exit 1
        }
      displayName: "Prepare Task Definition"

    # 2. Verify the file exists and check contents
    - script: |
        if exist taskdef.json (
            type taskdef.json
        ) else (
            echo taskdef.json not found!
            exit 1
        )
      displayName: "Check Final Task Definition"

    # 3. Register new revision
    - task: AWSCLI@1
      displayName: "Register Task Definition"
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        awsCommand: 'ecs'
        awsSubCommand: 'register-task-definition'
        awsArguments: '--cli-input-json file://taskdef.json'

    # 4. Update ECS Service
    - task: AWSCLI@1
      displayName: "Update ECS Service"
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        awsCommand: 'ecs'
        awsSubCommand: 'update-service'
        awsArguments: '--cluster $(clusterName) --service $(serviceName) --force-new-deployment'