trigger:
  branches:
    include:
      - backend/*

pool: self-hosted

variables:
- group: backend

- name: imageName
  value: backend
- name: imageTag
  value: $(Build.BuildId)
- name: awsAccountId
  value: '235110230377'
- name: awsRegion
  value: 'us-east-1'
- name: repositoryName
  value: 'ecommerce/backend'
- name: clusterName
  value: 'ecommerce-dev-cluster'
- name: serviceName
  value: 'my-backend-service'
- name: taskDefinitionName
  value: 'backend-task'

stages:

# =========================
# BUILD & PUSH
# =========================
- stage: BuildAndPush
  jobs:
  - job: Docker_Process
    steps:
    - script: docker system prune -af
      displayName: Clean Docker

    - script: |
        cd backend
        docker build -t $(imageName):$(imageTag) .
      displayName: Build Image

    - task: ECRPushImage@1
      displayName: Push to ECR
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        imageSource: 'imageName'
        sourceImageName: '$(imageName)'
        sourceImageTag: '$(imageTag)'
        sourceImageId: '$(imageName):$(imageTag)'
        repositoryName: '$(repositoryName)'
        pushTag: '$(imageTag)'

# =========================
# DEPLOY
# =========================
- stage: DeployToECS
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    steps:

    # ✅ Fetch task definition safely
    - task: AWSCLI@1
      name: FetchTaskDef
      displayName: Fetch Task Definition
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        awsCommand: ecs
        awsSubCommand: describe-task-definition
        awsArguments: '--task-definition $(taskDefinitionName) --query taskDefinition'

    # ✅ Modify JSON safely
    - powershell: |
        $json = '$(FetchTaskDef.AwsCliOutput)'
        $td = $json | ConvertFrom-Json

        # Update image
        $td.containerDefinitions[0].image = "$(awsAccountId).dkr.ecr.$(awsRegion).amazonaws.com/$(repositoryName):$(imageTag)"

        # Inject env vars
        $td.containerDefinitions[0].environment = @(
          @{ name="DATABASE_URL"; value="$(DATABASE_URL)" },
          @{ name="SECRET_KEY"; value="$(SECRET_KEY)" },
          @{ name="ACCESS_TOKEN_EXPIRE_MINUTES"; value="$(ACCESS_TOKEN_EXPIRE_MINUTES)" },
          @{ name="CORS_ORIGINS"; value="$(CORS_ORIGINS)" }
        )

        # Clean object (AWS requires minimal fields)
        $clean = @{
          family = $td.family
          networkMode = $td.networkMode
          containerDefinitions = $td.containerDefinitions
          requiresCompatibilities = $td.requiresCompatibilities
          cpu = $td.cpu
          memory = $td.memory
          executionRoleArn = $td.executionRoleArn
          taskRoleArn = $td.taskRoleArn
        }

        $clean | ConvertTo-Json -Depth 100 | Out-File new-taskdef.json
      displayName: Update Task Definition

    # ✅ Register new revision
    - task: AWSCLI@1
      displayName: Register Task Definition
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        awsCommand: ecs
        awsSubCommand: register-task-definition
        awsArguments: '--cli-input-json file://new-taskdef.json'

    # ✅ Deploy
    - task: AWSCLI@1
      displayName: Update ECS Service
      inputs:
        awsCredentials: 'aws-service-connection'
        regionName: '$(awsRegion)'
        awsCommand: ecs
        awsSubCommand: update-service
        awsArguments: '--cluster $(clusterName) --service $(serviceName) --force-new-deployment'